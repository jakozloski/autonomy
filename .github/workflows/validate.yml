name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate package structure
        run: python3 scripts/validate_package.py
      - name: Run unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -v
